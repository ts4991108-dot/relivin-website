<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset your password — Relivin</title>
<meta name="robots" content="noindex" />
<link rel="icon" href="assets/favicon.png" />
<link rel="apple-touch-icon" href="assets/icon-no-text.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --indigo: #4F46E5;
    --indigo-dark: #4338CA;
    --ink: #111827;
    --gray-600: #6B7280;
    --gray-200: #E5E7EB;
    --gray-50: #F9FAFB;
    --red: #DC2626;
    --green: #059669;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #F8F7FC;
    color: var(--ink);
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 380px;
    background: #fff;
    border-radius: 20px;
    padding: 32px 28px;
    box-shadow: 0 20px 60px -20px rgba(17, 24, 39, 0.25);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
  }
  .brand img {
    display: block;
    border-radius: 28%;
  }
  .brand span {
    font-weight: 700;
    font-size: 18px;
  }
  h1 {
    font-size: 20px;
    margin: 0 0 8px;
  }
  p.subtitle {
    margin: 0 0 24px;
    color: var(--gray-600);
    font-size: 14px;
    line-height: 1.5;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--gray-600);
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--gray-200);
    border-radius: 10px;
    font-size: 16px;
    font-family: inherit;
    margin-bottom: 16px;
  }
  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: var(--indigo);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
  }
  button:disabled {
    opacity: 0.6;
    cursor: default;
  }
  .message {
    font-size: 14px;
    margin-top: 14px;
    text-align: center;
    line-height: 1.5;
  }
  .message.error { color: var(--red); }
  .message.success { color: var(--green); }
</style>
</head>
<body>

<div class="card">
  <div class="brand">
    <img class="brand__mark-img" src="assets/icon-no-text.png" alt="" width="28" height="28" />
    <span>Relivin</span>
  </div>

  <div id="form-state">
    <h1>Set a new password</h1>
    <p class="subtitle">Choose a new password for your account below.</p>
    <label for="password">New password</label>
    <input type="password" id="password" autocomplete="new-password" placeholder="At least 6 characters" />
    <button id="submit-btn">Update password</button>
    <div id="message"></div>
  </div>

  <div id="invalid-state" style="display:none;">
    <h1>This link isn't valid</h1>
    <p class="subtitle">
      This password reset link is missing, expired, or has already been used. Please request a new one from the
      "Forgot password?" link on the Relivin sign-in screen.
    </p>
  </div>
</div>

<script src="js/config.js"></script>
<script>
(function () {
  var config = window.RELIVIN_CONFIG;
  var formState = document.getElementById('form-state');
  var invalidState = document.getElementById('invalid-state');
  var messageEl = document.getElementById('message');
  var passwordInput = document.getElementById('password');
  var submitBtn = document.getElementById('submit-btn');

  function getHashParams() {
    var hash = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : window.location.hash;
    var params = new URLSearchParams(hash);
    return {
      accessToken: params.get('access_token'),
      type: params.get('type'),
    };
  }

  function showMessage(text, kind) {
    messageEl.textContent = text;
    messageEl.className = 'message ' + kind;
  }

  var accessToken = null;

  function init() {
    var parsed = getHashParams();
    if (!parsed.accessToken || parsed.type !== 'recovery') {
      formState.style.display = 'none';
      invalidState.style.display = 'block';
      return;
    }
    accessToken = parsed.accessToken;
  }

  async function handleSubmit() {
    var password = passwordInput.value;
    if (!password || password.length < 6) {
      showMessage('Please choose a password with at least 6 characters.', 'error');
      return;
    }
    submitBtn.disabled = true;
    showMessage('', '');
    try {
      var response = await fetch(config.supabaseUrl + '/auth/v1/user', {
        method: 'PUT',
        headers: {
          apikey: config.supabaseAnonKey,
          Authorization: 'Bearer ' + accessToken,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ password: password }),
      });
      if (!response.ok) {
        var body = await response.json().catch(function () { return {}; });
        throw new Error(body.msg || body.error_description || 'Failed to update password.');
      }
      passwordInput.value = '';
      passwordInput.disabled = true;
      submitBtn.style.display = 'none';
      showMessage('Your password has been updated. You can now return to the Relivin app and sign in.', 'success');
    } catch (e) {
      showMessage(e.message || 'Something went wrong. Please try again.', 'error');
      submitBtn.disabled = false;
    }
  }

  submitBtn.addEventListener('click', handleSubmit);
  init();
})();
</script>

</body>
</html>
